<div class="tc-card" v-bind:class="{ 'tc-card--done': task.done }">
  <div class="tc-top">
    <input
      class="tc-check"
      type="checkbox"
      v-bind:checked="task.done"
      v-on:change="$emit('toggle', task.id)"
    >
    <span class="tc-title" v-bind:class="{ 'tc-title--done': task.done }">
      {{ task.title }}
    </span>
    <button class="tc-del" v-on:click="$emit('remove', task.id)" title="删除">×</button>
  </div>
  <div class="tc-meta" v-if="task.priority || task.tag || task.assignee">
    <span class="tc-badge" v-bind:class="'tc-badge--' + task.priority">{{ priorityLabel }}</span>
    <span class="tc-tag" v-if="task.tag">{{ task.tag }}</span>
    <span class="tc-assignee ml-auto" v-if="task.assignee">
      <span class="tc-avatar">{{ initial }}</span>
      {{ task.assignee }}
    </span>
  </div>
</div>
