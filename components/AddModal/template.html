<div class="overlay" v-on:click.self="$emit('close')">
  <div class="am-box">
    <div class="am-head">新建任务</div>
    <div class="am-body">
      <div>
        <label class="am-label">任务名称 *</label>
        <input class="input" type="text" placeholder="输入任务名称…" v-model="form.title">
      </div>
      <div>
        <label class="am-label">描述</label>
        <input class="input" type="text" placeholder="可选" v-model="form.desc">
      </div>
      <div class="am-row">
        <div>
          <label class="am-label">优先级</label>
          <select class="input" v-model="form.priority">
            <option value="high">高</option>
            <option value="medium">中</option>
            <option value="low">低</option>
          </select>
        </div>
        <div>
          <label class="am-label">标签</label>
          <input class="input" type="text" placeholder="如：前端" v-model="form.tag">
        </div>
      </div>
      <div>
        <label class="am-label">负责人</label>
        <input class="input" type="text" placeholder="如：张三" v-model="form.assignee">
      </div>
    </div>
    <div class="am-foot">
      <button class="btn btn-ghost"   v-on:click="$emit('close')">取消</button>
      <button class="btn btn-primary" v-on:click="submit">创建</button>
    </div>
  </div>
</div>
